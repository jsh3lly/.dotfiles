decorations: none
draw_bold_text_with_bright_colors: true

mouse_bindings:
- { mouse: Middle, action: PasteSelection }

font:
  # Normal (roman) font face
  normal:
    family: JetbrainsMono Nerd Font # Make sure it doesnt end with 'Mono'. If it does, icons will be small
    # family: JetBrains Mono Nerd Font Complete
    # The `style` can be specified to pick a specific face.
    style: Medium

  # Bold font face
  bold:
    family: JetBrainsMono Nerd Font
    # The `style` can be specified to pick a specific face.
    style: ExtraBold

  # Italic font face
  # italic:
  #   family: JetBrains Mono Italics
    # The `style` can be specified to pick a specific face.
    # style: Italic

  # Point size of the font
  # X11
  size: 7.5   # awesome
  # size: 10   # Hyprland
  # Wayland
  # size: 10.5

# font:
#   normal:
#     family: ComicShannsMono Nerd Font 
#     style: Regular
#
#   bold:
#     family: ComicShannsMono Nerd Font 
#     style: aBold
#
#   # Point size of the font
#   size: 7.5

colors:
  primary:
    background: '#080808'
    foreground: '#FFFFFF'

key_bindings:
  - { key: Return,   mods: Shift,   chars: "\x1b[13;2u" }
  - { key: Return,   mods: Control, chars: "\x1b[13;5u" }
  - { key: Tab,  mods: Control,        chars: "\x1b[27;5;9~" }
  - { key: Tab,  mods: Control|Shift,  chars: "\x1b[27;6;9~" }

window:
  opacity: 0.75

